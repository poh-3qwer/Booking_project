{% extends "base.html" %}
{% block content %}
    {% if error %}
    <p style="color:red;">{{ error }}</p>
{% endif %}

<form method="post">
    {% csrf_token %}

    <div>
        <label>Login:</label>
        <input type="text" name="username">
    </div>

    <div>
        <label>Password:</label>
        <input type="password" name="password">
    </div>

    <button type="submit">Login</button>
</form>

{% endblock %}
